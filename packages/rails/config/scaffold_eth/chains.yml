# Chain metadata used by the server (eth.rb) layer and serialized to the browser.
# Mirrors viem's chain definitions for the networks ETH-on-Rails supports out of the box.
# `%{alchemy}` is interpolated with the configured Alchemy API key at load time.

hardhat:
  id: 31337
  name: Hardhat
  network: hardhat
  rpc: http://127.0.0.1:8545
  ws: ws://127.0.0.1:8545
  currency: { name: Ether, symbol: ETH, decimals: 18 }
  block_explorer: ""
  color: "#b8af0c"
  testnet: true
  local: true

